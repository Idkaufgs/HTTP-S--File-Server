<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Login</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <link rel="icon" type="image/png" href="images/icons/favicon.ico"/>
    </head>
    <body>
        <div class="limiter">
            <div class="container-login">
                <div class="wrap-login">
                    <form class="login-form validate-form">
                        <span class="login-form-title">
                            User Login
                        </span>

                        <div class="wrap-input validate-input" data-validate = "Username required.">
                            <input class="input" type="text" name="user" id="user" placeholder="Username">
                            <span class="symbol-input">
                                <i class="fa fa-envelope" aria-hidden="true"></i>
                            </span>
                        </div>

                        <div class="wrap-input validate-input" data-validate = "Password is required">
                            <input class="input" type="password" name="pwd" id="pwd" placeholder="Password">
                            <span class="symbol-input100">
						        <i class="fa fa-lock" aria-hidden="true"></i>
						    </span>
                        </div>

                        <div class="container-login-form-btn">
                            <button class="login-form-btn" type="submit">
                                Login
                            </button>
                        </div>

                        <div class="text-center p-t-12">
                            <span class="txt1">
                                Forgot
                            </span>
                            <a class="txt2" href="#">
                                Username / Password?
                            </a>
                        </div>

                        <div class="text-center p-t-136">
						    <a class="txt2" href="#">
						        Create your Account
						        <i class="fa fa-long-arrow-right m-l-5" aria-hidden="true"></i>
						    </a>
					    </div>

                    </form>
                    <div id="output"></div>
                </div>
            </div>
        </div>
        <script src="login.js"></script>
    </body>
</html>
