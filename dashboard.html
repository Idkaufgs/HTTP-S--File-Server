<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - USERNAME</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ccc; text-align: left; }
        th { background: #eee; }
        tr:nth-child(even) { background: #fafafa; }
        .logout { float: right; margin-top: -40px; }
        .button { padding: 6px 12px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>Welcome, USERNAME!</h1>
    <a href="#" class="button logout">Logout</a>

    <h2>Your Files</h2>
    <table>
        <tr>
            <th>Filename</th>
            <th>Size</th>
            <th>Uploaded</th>
            <th>Actions</th>
        </tr>
        <tr>
            <td>example1.txt</td>
            <td>12 KB</td>
            <td>2026-02-07</td>
            <td>
                <a href="#" class="button">Download</a>
                <a href="#" class="button" style="background:red;">Delete</a>
            </td>
        </tr>
        <tr>
            <td>example2.jpg</td>
            <td>1.2 MB</td>
            <td>2026-02-06</td>
            <td>
                <a href="#" class="button">Download</a>
                <a href="#" class="button" style="background:red;">Delete</a>
            </td>
        </tr>
        <tr>
            <td>notes.pdf</td>
            <td>450 KB</td>
            <td>2026-02-05</td>
            <td>
                <a href="#" class="button">Download</a>
                <a href="#" class="button" style="background:red;">Delete</a>
            </td>
        </tr>
    </table>

</body>
</html>
